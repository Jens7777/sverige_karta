<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kommun-karta – markera & exportera</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root{--panel-bg:#fff;--panel-border:#e7edf7;--muted:#6b7280;--chip:#eef2ff;--rowHover:#eef6ff;--rowSelected:#d9eef3}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f4f6fb;overflow:hidden}
    body{overscroll-behavior:none}
    #app{height:100dvh;display:grid;grid-template-columns:320px minmax(0,1fr) 320px;gap:12px;padding:12px;box-sizing:border-box;overflow:hidden}
    .panel,#mapWrap{min-height:0;min-width:0;height:100%;background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:14px;box-shadow:0 6px 20px rgba(15,23,42,.06)}
    .panel{padding:14px;display:flex;flex-direction:column;gap:12px;overflow:hidden}
    #mapWrap{position:relative;overflow:hidden} #map{height:100%;width:100%;background:#b6d6e3}
    h2{margin:0;font-size:14px;color:#111827}.small{font-size:12px;color:var(--muted);line-height:1.35}
    .palette{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}.swatch{width:100%;aspect-ratio:1/1;border-radius:6px;border:2px solid rgba(0,0,0,.08);cursor:pointer;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)} .swatch[aria-pressed="true"]{outline:3px solid rgba(15,23,42,.85);outline-offset:2px}
    .divider{height:1px;background:var(--panel-border);margin:4px 0}.row{display:flex;align-items:center;gap:10px}.field{display:flex;flex-direction:column;gap:6px}.label{font-size:12px;font-weight:900;color:#111827}
    .btn{width:100%;padding:10px;border:0;border-radius:10px;background:#334155;color:#fff;font-weight:800;cursor:pointer;box-shadow:0 6px 14px rgba(15,23,42,.14);transition:transform .06s ease,box-shadow .06s ease,background .1s ease}
    .btn:hover{background:#1f2937;transform:translateY(-1px);box-shadow:0 10px 18px rgba(15,23,42,.18)} .btnSecondary{background:#e5e7eb;color:#111827;box-shadow:none;font-weight:900}.btnSecondary:hover{background:#dbe3ee;box-shadow:none}
    input[type="checkbox"],input[type="radio"]{transform:translateY(1px)}
    input[type="text"],input[type="number"],select{padding:10px;border-radius:10px;border:1px solid var(--panel-border);font-size:13px;outline:none;background:#fff}
    input[type="text"]:focus,input[type="number"]:focus,select:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(147,197,253,.35)}
    #muniList{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;border-top:1px solid var(--panel-border);padding-top:10px;overscroll-behavior:contain}
    .muniRow{padding:10px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;user-select:none}.muniRow:hover{background:var(--rowHover)}.muniRow.selected{background:var(--rowSelected);font-weight:900;color:#0f3b46}
    .muniName{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pill{font-size:12px;color:#0f172a;background:var(--chip);padding:3px 8px;border-radius:999px;font-weight:900}
    #status{font-size:12px;color:var(--muted)} #status:empty{display:none}
    .selected-label-marker{background:transparent;border:0}.selected-label{display:inline-block;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,.92);border:1px solid rgba(15,23,42,.12);box-shadow:0 2px 8px rgba(15,23,42,.14);color:#111827;font-size:12px;font-weight:800;line-height:1.2;white-space:nowrap;pointer-events:none}
    .leaflet-tooltip{font-size:12px;padding:6px 10px;border-radius:12px}.leaflet-popup-content{margin:10px 12px;font-size:12px}.leaflet-popup-content-wrapper{border-radius:14px}.leaflet-control-zoom{border:1px solid rgba(15,23,42,.12);border-radius:10px;overflow:hidden;box-shadow:0 6px 14px rgba(15,23,42,.10)}.leaflet-control-zoom a{width:34px;height:34px;line-height:34px}
    .leaflet-container .leaflet-interactive:focus,.leaflet-container .leaflet-interactive:focus-visible{outline:none}
    #footer{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);border-top:1px solid rgba(15,23,42,.10);padding:6px 10px;font-size:12px;color:#111827;display:flex;justify-content:center;gap:6px;align-items:center;pointer-events:none}
    #footer a{pointer-events:auto;color:#2563eb;text-decoration:none;font-weight:900}
  </style>
</head>
<body>
  <div id="app">
    <div class="panel">
      <div class="field"><h2>Välj bakgrundsfärg för alla kommuner:</h2><div id="basePalette" class="palette"></div></div>
      <div class="field"><h2>Färglägg täckningsområden:</h2><div id="selPalette" class="palette"></div></div>
      <div class="row"><input id="borders" type="checkbox" checked /><label for="borders" class="label">Visa kantlinje</label></div>
      <div class="row"><input id="showSelectedLabels" type="checkbox" /><label for="showSelectedLabels" class="label">Visa namn för markerade kommuner</label></div>
      <div class="row"><input id="basemapModeTiles" name="basemapMode" type="radio" value="tiles" checked /><label for="basemapModeTiles" class="label">Bakgrundskarta</label></div>
      <div class="row"><input id="basemapModePlain" name="basemapMode" type="radio" value="plain" /><label for="basemapModePlain" class="label">Ren kommunvy</label></div>
      <div id="basemapHint" class="small"></div>
      <div class="divider"></div>
      <button id="clearBtn" class="btn btnSecondary" type="button">Rensa täckning</button>
      <div class="divider"></div>
      <div class="field">
        <h2>Export</h2>
        <div class="row"><input id="exportModeView" name="exportMode" type="radio" value="view" checked /><label for="exportModeView" class="label">Kartvy som i verktyget</label></div>
        <div class="row"><input id="exportModeMapOnly" name="exportMode" type="radio" value="mapOnly" /><label for="exportModeMapOnly" class="label">Bara karta med kommungränser</label></div>
        <div class="row" style="margin-top:4px"><input id="exportExtentCurrent" name="exportExtent" type="radio" value="current" checked /><label for="exportExtentCurrent" class="label">Aktuell inzoomning</label></div>
        <div class="row"><input id="exportExtentAll" name="exportExtent" type="radio" value="all" /><label for="exportExtentAll" class="label">Hela Sverige</label></div>
      </div>
      <button id="exportBtn" class="btn" type="button">Exportera PNG</button>
      <div class="divider"></div>
      <div class="row" style="gap:10px;align-items:flex-end"><div class="field" style="flex:1"><div class="label">Zoom (exakt)</div><input id="zoomNumber" type="number" step="0.1" min="0" max="20" value="4.5" /></div><button id="applyZoom" class="btn btnSecondary" type="button" style="width:auto;padding:10px 14px">Sätt</button></div>
      <div id="status"></div><div class="small" id="debugKeys" style="display:none"></div>
    </div>
    <div id="mapWrap"><div id="map"></div><div id="footer"><span>Karta och kommungränser data från</span><a href="https://www.openstreetmap.org/" target="_blank" rel="noreferrer">OpenStreetMap</a><span>och</span><a href="https://github.com/okfse/sweden-geojson" target="_blank" rel="noreferrer">okfse/sweden-geojson</a></div></div>
    <div class="panel"><div style="display:flex;align-items:center;justify-content:space-between;gap:10px"><div><div style="font-size:18px;font-weight:950;color:#111827">Kommuner</div><div id="countLine" class="small">(0 valda av 0 totalt)</div></div><div id="selectedPill" class="pill">0</div></div><div class="field"><input id="search" type="text" placeholder="Sök kommun…" /></div><div id="muniList"></div></div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
  <script>
    (() => {
      "use strict";
      const RISE_COLORS=["#009ca6","#e83c63","#ffe500","#8dc8c7","#f5a9ab","#ffee8d","#ebf5f0","#fde8df","#fff7dd","#482d55","#0e4e65","#f0f0f0","#c8c8c8","#828282","#555555"], BASE_FILL_OPACITY=.35, SEL_FILL_OPACITY=.9, GEOJSON_URLS=["https://raw.githubusercontent.com/kodapan/geodata/master/geojson/kommuner.geo.json","https://raw.githubusercontent.com/okfse/sweden-geojson/master/swedish_municipalities.geojson"], STORAGE_KEY="kommun_karta_selected_ids_v1", BASEMAP_MODE_KEY="kommun_karta_basemap_mode_v1", OSM_TILE_URL="https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", OSM_ATTRIBUTION='&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noreferrer">OpenStreetMap</a> contributors', FOOTER_WITH_BASEMAP='<span>Karta och kommungränser data från</span><a href="https://www.openstreetmap.org/" target="_blank" rel="noreferrer">OpenStreetMap</a><span>och</span><a href="https://github.com/okfse/sweden-geojson" target="_blank" rel="noreferrer">okfse/sweden-geojson</a>', FOOTER_NO_BASEMAP='<span>Kommungränser data från</span><a href="https://github.com/okfse/sweden-geojson" target="_blank" rel="noreferrer">okfse/sweden-geojson</a>', REMOTE_TILE_PROTOCOLS=new Set(["http:","https:"]);
      const defaultBasemapMode=REMOTE_TILE_PROTOCOLS.has(location.protocol)?"tiles":"plain";
      const s={baseFill:"#8dc8c7",selectedFill:"#e83c63",showBorders:true,showSelectedLabels:false,basemapMode:defaultBasemapMode,map:null,baseTileLayer:null,municipalitiesLayer:null,inferredNameKey:null,inferredIdKey:null,idToLayer:new Map(),idToLabelMarker:new Map(),idToName:new Map(),selectedIds:new Set(),basemapEnabled:false};
      const $=id=>document.getElementById(id), els={map:$("map"),basePalette:$("basePalette"),selPalette:$("selPalette"),borders:$("borders"),showSelectedLabels:$("showSelectedLabels"),basemapModeTiles:$("basemapModeTiles"),basemapModePlain:$("basemapModePlain"),basemapHint:$("basemapHint"),clearBtn:$("clearBtn"),exportBtn:$("exportBtn"),zoomNumber:$("zoomNumber"),applyZoom:$("applyZoom"),status:$("status"),debugKeys:$("debugKeys"),countLine:$("countLine"),selectedPill:$("selectedPill"),search:$("search"),muniList:$("muniList"),footer:$("footer")};
      const setStatus=m=>els.status.textContent=m||"", setDebug=m=>{els.debugKeys.style.display=m?"block":"none"; els.debugKeys.textContent=m||"";};
      const checked=n=>(document.querySelector(`input[name="${n}"]:checked`)||{}).value;
      const exportOptions=()=>({mode:checked("exportMode")||"view",extent:checked("exportExtent")||"current"});
      const canUseBaseTiles=()=>REMOTE_TILE_PROTOCOLS.has(location.protocol);
      const wantsBaseTiles=()=>s.basemapMode==="tiles";
      const shouldUseBaseTiles=()=>wantsBaseTiles()&&canUseBaseTiles();
      const syncBasemapInputs=()=>{ els.basemapModeTiles.checked=s.basemapMode==="tiles"; els.basemapModePlain.checked=s.basemapMode!=="tiles"; };
      const updateFooter=()=>{ els.footer.innerHTML=s.basemapEnabled?FOOTER_WITH_BASEMAP:FOOTER_NO_BASEMAP; };
      const updateBasemapHint=()=>{ els.basemapHint.textContent=wantsBaseTiles()&&!canUseBaseTiles()?"Bakgrundskarta kräver att HTML-filen öppnas via http/https i stället för direkt från disk. Använd starta_lokal_karta.bat för lokal körning.":"";
      };
      const saveBasemapMode=()=>{ try{localStorage.setItem(BASEMAP_MODE_KEY,s.basemapMode)}catch(_){} };
      const loadBasemapMode=()=>{ try{ const v=localStorage.getItem(BASEMAP_MODE_KEY); return v==="tiles"||v==="plain"?v:defaultBasemapMode; }catch(_){ return defaultBasemapMode; } };
      function setTilePaneVisible(mapObj,on){ const pane=mapObj?.getPane?.("tilePane"); if(pane) pane.style.opacity=on?"1":"0"; }
      function suppressLayerFocus(layer){ const el=layer?.getElement?.(); if(!el) return; el.removeAttribute("tabindex"); el.style.outline="none"; if(typeof el.blur==="function") el.blur(); }
      function dropBaseTiles(mapObj,tileLayer,isPrimary=false){ if(tileLayer&&mapObj.hasLayer(tileLayer)) mapObj.removeLayer(tileLayer); setTilePaneVisible(mapObj,true); if(isPrimary){ if(s.baseTileLayer===tileLayer) s.baseTileLayer=null; s.basemapEnabled=false; updateFooter(); } }
      function mountBaseTiles(mapObj,isPrimary=false){ if(!shouldUseBaseTiles()) return null; let blocked=false, ready=false; setTilePaneVisible(mapObj,false); const tiles=L.tileLayer(OSM_TILE_URL,{maxZoom:19,crossOrigin:true,referrerPolicy:"strict-origin-when-cross-origin",attribution:OSM_ATTRIBUTION}); tiles.on("tileload",e=>{ const img=e.tile; if(blocked||!img) return; if(img.naturalWidth===256&&img.naturalHeight===256){ ready=true; setTilePaneVisible(mapObj,true); if(isPrimary){ s.basemapEnabled=true; updateFooter(); } return; } blocked=true; dropBaseTiles(mapObj,tiles,isPrimary); if(isPrimary){ s.basemapMode="plain"; syncBasemapInputs(); saveBasemapMode(); updateBasemapHint(); setStatus("Bakgrundskartan kunde inte laddas i den här öppningen. Verktyget fortsätter i ren kommunvy."); } }); tiles.on("load",()=>{ if(!ready) setTilePaneVisible(mapObj,true); }); return tiles.addTo(mapObj); }
      function applyBasemapMode(){ if(!s.map) return; if(s.baseTileLayer) dropBaseTiles(s.map,s.baseTileLayer,true); s.baseTileLayer=mountBaseTiles(s.map,true); if(!s.baseTileLayer){ s.basemapEnabled=false; updateFooter(); } updateBasemapHint(); }
      const esc=x=>String(x).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
      const normName=v=>{if(!v)return"Okänd kommun"; let x=String(v).trim(), l=x.toLowerCase(); if(l.endsWith(" kommun"))x=x.slice(0,-7); if(l.endsWith(" stad"))x=x.slice(0,-5); return x.trim()||"Okänd kommun";};
      function inferNameKey(fs){ if(!fs?.length) return null; const keys=Object.keys(fs[0].properties||{}), bad=/(id|kod|code|ref|gid|objectid|fid|osm|shape|area|pop|count)/i; let best={key:null,score:-1e9}; for(const k of keys){ let c=0,u=new Set(),len=0; for(const f of fs.slice(0,80)){ const v=(f.properties||{})[k]; if(typeof v==="string"&&v.trim()){ c++; u.add(v.trim()); len+=v.trim().length; } } if(!c) continue; let score=c*10+u.size+Math.min(20,len/c); if(bad.test(k)) score-=50; if(/name/i.test(k)) score+=20; if(/kommun|knnamn|namn/i.test(k)) score+=15; if(score>best.score) best={key:k,score}; } return best.key; }
      function inferIdKey(fs){ if(!fs?.length) return null; const keys=Object.keys(fs[0].properties||{}), pref=["ref:se:kommun:kod","REF:SE:KOMMUN:KOD","KOMMUNKOD","kommunkod","KNKOD","id","ID","code","CODE"]; for(const k of pref) if(keys.includes(k)) return k; let best={key:null,score:-1}; for(const k of keys){ let hits=0; for(const f of fs.slice(0,80)) if(/^[0-9]{4}$/.test(String((f.properties||{})[k]??"").trim())) hits++; if(hits>best.score) best={key:k,score:hits}; } return best.score>0?best.key:null; }
      function muniName(p){ if(!p) return "Okänd kommun"; if(s.inferredNameKey&&p[s.inferredNameKey]) return normName(p[s.inferredNameKey]); const v=p.short_name||p.SHORT_NAME||p.name||p.NAME||p.kommun||p.KOMMUN||p.kommunnamn||p.KOMMUNNAMN||p.KNNAMN||p.NAMN||p.municipality||p.Municipality; if(v) return normName(v); for(const k of Object.keys(p)) if(/(name|namn|kommun)/i.test(k)&&typeof p[k]==="string"&&p[k].trim()) return normName(p[k]); return "Okänd kommun"; }
      function muniId(feature,layer){ const p=feature?.properties||{}; return p[s.inferredIdKey]||p["ref:se:kommun:kod"]||p["REF:SE:KOMMUN:KOD"]||p.KOMMUNKOD||p.kommunkod||p.KNKOD||p.id||String(layer._leaflet_id); }
      const polyStyle=sel=>({color:s.showBorders?"#ffffff":"transparent",weight:s.showBorders?.9:0,opacity:1,fillColor:sel?s.selectedFill:s.baseFill,fillOpacity:sel?SEL_FILL_OPACITY:BASE_FILL_OPACITY});
      const refreshStyles=()=>s.idToLayer.forEach((layer,id)=>layer.setStyle(polyStyle(s.selectedIds.has(id))));
      const save=()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify([...s.selectedIds]))}catch(_){}}, load=()=>{try{const a=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); return Array.isArray(a)?a:[]}catch(_){return[]}};
      const updateCounts=()=>{els.countLine.textContent=`(${s.selectedIds.size} valda av ${s.idToName.size} totalt)`; els.selectedPill.textContent=String(s.selectedIds.size);};
      function centerPt(layer){ return s.map.latLngToContainerPoint(layer.getBounds().getCenter()); }
      function labelBox(name,p){ const hw=Math.max(24,Math.round(String(name).length*3.6+12)); return {minX:p.x-hw,maxX:p.x+hw,minY:p.y-14,maxY:p.y+14}; }
      function refreshSelectedLabels(){ s.idToLayer.forEach((layer,id)=>{ const ex=s.idToLabelMarker.get(id); if(ex){s.map.removeLayer(ex); s.idToLabelMarker.delete(id);} if(!(s.showSelectedLabels&&s.selectedIds.has(id))) return; const m=L.marker(layer.getBounds().getCenter(),{interactive:false,keyboard:false,zIndexOffset:1000,icon:L.divIcon({className:"selected-label-marker",html:`<div class="selected-label">${esc(s.idToName.get(id)||"")}</div>`})}).addTo(s.map); s.idToLabelMarker.set(id,m); }); }
      function setSelected(id,on,updateList=true){ if(!s.idToLayer.has(id)) return; on?s.selectedIds.add(id):s.selectedIds.delete(id); const layer=s.idToLayer.get(id); layer.setStyle(polyStyle(on)); if(on) layer.bringToFront(); if(updateList){ const row=document.querySelector(`.muniRow[data-id="${CSS.escape(String(id))}"]`); if(row) row.classList.toggle("selected",on);} refreshSelectedLabels(); save(); updateCounts(); }
      const toggleSelected=id=>setSelected(id,!s.selectedIds.has(id),true);
      function renderPalette(el,colors,getCurrent,setCurrent,opacity="1"){ el.innerHTML=""; colors.forEach(c=>{ const b=document.createElement("button"); b.className="swatch"; b.type="button"; b.style.background=c; b.style.opacity=opacity; b.setAttribute("aria-pressed",String(c===getCurrent())); b.onclick=()=>{setCurrent(c); el.querySelectorAll(".swatch").forEach(n=>n.setAttribute("aria-pressed","false")); b.setAttribute("aria-pressed","true"); refreshStyles();}; el.appendChild(b); }); }
      function buildList(){ els.muniList.innerHTML=""; [...s.idToName.entries()].map(([id,name])=>({id,name})).sort((a,b)=>a.name.localeCompare(b.name,"sv")).forEach(({id,name})=>{ const row=document.createElement("div"); row.className="muniRow"+(s.selectedIds.has(id)?" selected":""); row.dataset.id=String(id); row.dataset.name=name.toLowerCase(); row.innerHTML=`<div class="muniName">${esc(name)}</div>`; row.onclick=()=>toggleSelected(id); els.muniList.appendChild(row); }); updateCounts(); }
      const filterList=q=>{ q=(q||"").trim().toLowerCase(); [...els.muniList.children].forEach(r=>r.style.display=(r.dataset.name||"").includes(q)?"flex":"none"); };
      function normalizeFC(data){ if(data?.type==="FeatureCollection"&&Array.isArray(data.features)) return data; if(data?.type==="Feature"&&data.geometry) return {type:"FeatureCollection",features:[data]}; if(Array.isArray(data)&&data[0]?.type==="Feature") return {type:"FeatureCollection",features:data}; if(data?.type==="Topology"&&data.objects&&typeof topojson!=="undefined"){ const k=Object.keys(data.objects)[0]; const fc=topojson.feature(data,data.objects[k]); return fc?.type==="FeatureCollection"?fc:fc?.type==="Feature"?{type:"FeatureCollection",features:[fc]}:null; } return null; }
      async function fetchGeo(){ let lastErr=null; for(const url of GEOJSON_URLS){ try{ const res=await fetch(url); if(!res.ok) throw new Error(`HTTP ${res.status}`); const json=JSON.parse(await res.text()); const fc=normalizeFC(json); if(!fc?.features?.some(f=>f?.geometry)) throw new Error("GeoJSON saknar geometrier"); return fc; }catch(e){ lastErr=e; } } throw lastErr||new Error("Kunde inte ladda GeoJSON"); }
      function exportBounds(extent){ return extent==="all"&&s.municipalitiesLayer ? s.municipalitiesLayer.getBounds() : s.map.getBounds(); }
      function geometryToPath(geom,mapObj){ if(!geom?.type) return ""; if(geom.type==="Polygon") return polygonToPath(geom.coordinates,mapObj); if(geom.type==="MultiPolygon") return geom.coordinates.map(p=>polygonToPath(p,mapObj)).filter(Boolean).join(" "); return ""; }
      function polygonToPath(rings,mapObj){ const paths=[]; for(const ring of rings||[]){ if(!Array.isArray(ring)||ring.length<3) continue; let d=""; for(let i=0;i<ring.length;i++){ const [lng,lat]=ring[i]||[]; const p=mapObj.latLngToContainerPoint([lat,lng]); d+=(i?" L ":"M ")+(Math.round(p.x*10)/10)+" "+(Math.round(p.y*10)/10); } paths.push(d+" Z"); } return paths.join(" "); }
      function makeTempMap(bounds){ const div=document.createElement("div"); const w=Math.round(s.map.getSize().x), h=Math.round(s.map.getSize().y); div.style.cssText=`position:fixed;left:-10000px;top:-10000px;width:${w}px;height:${h}px;pointer-events:none;opacity:0`; document.body.appendChild(div); const m=L.map(div,{zoomControl:false,attributionControl:false,zoomSnap:.1,zoomDelta:.1,fadeAnimation:false,zoomAnimation:false,inertia:false}); m.invalidateSize({animate:false}); const tiles=mountBaseTiles(m,false); m.fitBounds(bounds,{animate:false,padding:[8,8]}); return {map:m,div,tiles}; }
      function fullViewportCrop(mapObj){ const size=mapObj.getSize(); return {x:0,y:0,width:Math.max(1,Math.round(size.x)),height:Math.max(1,Math.round(size.y))}; }
      function tileImages(mapObj){ return [...mapObj.getContainer().querySelectorAll(".leaflet-tile-pane img.leaflet-tile")]; }
      function tilesReady(mapObj,requireAtLeastOne=false){ const imgs=tileImages(mapObj); if(!imgs.length) return !requireAtLeastOne; return imgs.every(img=>img.complete&&img.naturalWidth>0&&img.naturalHeight>0); }
      function waitForTiles(mapObj, tileLayer, timeoutMs=2500){ return new Promise(resolve=>{ if(!tileLayer) return resolve(); let rafId=0, done=false, sawTile=tileImages(mapObj).length>0; if(sawTile&&tilesReady(mapObj,true)) return resolve(); const finish=()=>{ if(done) return; done=true; if(rafId) cancelAnimationFrame(rafId); tileLayer.off("load", check); tileLayer.off("tileload", check); tileLayer.off("tileerror", check); resolve(); }; const deadline=performance.now()+timeoutMs; const check=()=>{ if(done) return; sawTile=sawTile||tileImages(mapObj).length>0; if(!mapObj.hasLayer(tileLayer)) return finish(); if((sawTile&&tilesReady(mapObj,true))||performance.now()>=deadline) return finish(); rafId=requestAnimationFrame(check); }; tileLayer.on("load", check); tileLayer.on("tileload", check); tileLayer.on("tileerror", check); check(); }); }
      function drawTiles(ctx,mapObj,crop){ const tileImgs=mapObj.getContainer().querySelectorAll(".leaflet-tile-pane img.leaflet-tile"); tileImgs.forEach(img=>{ try{ const left=parseFloat(img.style.left||"0")-crop.x, top=parseFloat(img.style.top||"0")-crop.y, w=img.naturalWidth||256, h=img.naturalHeight||256; if(Number.isFinite(left)&&Number.isFinite(top)&&img.complete) ctx.drawImage(img,left,top,w,h); } catch(_){} }); }
      function drawOverlay(ctx,mapObj,bounds,crop){ ctx.save(); ctx.translate(-crop.x,-crop.y); s.idToLayer.forEach((layer,id)=>{ const feat=layer.feature; if(!feat?.geometry||!layer.getBounds().intersects(bounds)) return; const pathStr=geometryToPath(feat.geometry,mapObj); if(!pathStr) return; const p=new Path2D(pathStr), sel=s.selectedIds.has(id); ctx.globalAlpha=sel?SEL_FILL_OPACITY:BASE_FILL_OPACITY; ctx.fillStyle=sel?s.selectedFill:s.baseFill; ctx.fill(p); if(s.showBorders){ ctx.globalAlpha=1; ctx.strokeStyle="#ffffff"; ctx.lineWidth=1; ctx.stroke(p); } }); ctx.restore(); if(s.showSelectedLabels){ s.idToLayer.forEach((layer,id)=>{ if(!s.selectedIds.has(id)||!layer.getBounds().intersects(bounds)) return; const raw=String(s.idToName.get(id)||""), c=mapObj.latLngToContainerPoint(layer.getBounds().getCenter()), x=Math.round((c.x-crop.x)*10)/10, y=Math.round((c.y-crop.y)*10)/10, padX=7, hh=24; ctx.save(); ctx.font="800 12px system-ui, -apple-system, Segoe UI, Roboto, sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; const tw=Math.ceil(ctx.measureText(raw).width), ww=Math.max(48,tw+padX*2); ctx.globalAlpha=.92; ctx.fillStyle="#ffffff"; const rx=x-ww/2, ry=y-hh/2, rr=10; ctx.beginPath(); ctx.moveTo(rx+rr,ry); ctx.arcTo(rx+ww,ry,rx+ww,ry+hh,rr); ctx.arcTo(rx+ww,ry+hh,rx,ry+hh,rr); ctx.arcTo(rx,ry+hh,rx,ry,rr); ctx.arcTo(rx,ry,rx+ww,ry,rr); ctx.closePath(); ctx.fill(); ctx.globalAlpha=1; ctx.strokeStyle="rgba(15,23,42,0.12)"; ctx.stroke(); ctx.fillStyle="#111827"; ctx.fillText(raw,x,y+0.5); ctx.restore(); }); } }
      function downloadCanvas(canvas,name){ const a=document.createElement("a"); a.href=canvas.toDataURL("image/png"); a.download=name; document.body.appendChild(a); a.click(); a.remove(); }
      async function exportPng(){ if(!s.municipalitiesLayer){ alert("Kartdatan är inte färdigladdad än."); return; } setStatus(""); const {mode,extent}=exportOptions(), bounds=exportBounds(extent), useTemp=extent==="all", work=useTemp?makeTempMap(bounds):{map:s.map,div:null,tiles:s.baseTileLayer}, mapObj=work.map; try{ const shouldDrawBasemap=mode==="view"&&!!work.tiles&&(!useTemp?s.basemapEnabled:wantsBaseTiles()); if(shouldDrawBasemap) await waitForTiles(mapObj, work.tiles); const crop=fullViewportCrop(mapObj); const canvas=document.createElement("canvas"), ctx=canvas.getContext("2d"); canvas.width=crop.width; canvas.height=crop.height; if(mode==="view"){ ctx.fillStyle="#b6d6e3"; ctx.fillRect(0,0,crop.width,crop.height); if(shouldDrawBasemap) drawTiles(ctx,mapObj,crop); } else { ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,crop.width,crop.height); } drawOverlay(ctx,mapObj,bounds,crop); downloadCanvas(canvas,`sverigekarta_kommuner_${mode}_${extent}_${new Date().toISOString().slice(0,10)}.png`); } catch(e){ console.error(e); setStatus("Export misslyckades: "+(e?.message||e)); } finally { if(work.div){ mapObj.remove(); work.div.remove(); } } }
      async function init(){ try{ setStatus("Laddar kartdata…"); s.basemapMode=loadBasemapMode(); syncBasemapInputs(); updateBasemapHint(); updateFooter(); renderPalette(els.basePalette,RISE_COLORS,()=>s.baseFill,v=>s.baseFill=v,.55); renderPalette(els.selPalette,RISE_COLORS,()=>s.selectedFill,v=>s.selectedFill=v); s.map=L.map("map",{zoomControl:true,attributionControl:true,zoomSnap:.1,zoomDelta:.1,wheelPxPerZoomLevel:120}).setView([62.8,16.3],4.5); applyBasemapMode(); const data=await fetchGeo(); s.inferredNameKey=inferNameKey(data.features); s.inferredIdKey=inferIdKey(data.features); const keys=Object.keys(data.features?.[0]?.properties||{}); s.municipalitiesLayer=L.geoJSON(data,{style:()=>polyStyle(false),onEachFeature:(feature,layer)=>{ const id=muniId(feature,layer), name=muniName(feature.properties); s.idToLayer.set(id,layer); s.idToName.set(id,name); layer.on("add",()=>requestAnimationFrame(()=>suppressLayerFocus(layer))); layer.on("mouseover",()=>{ if(!(s.showSelectedLabels&&s.selectedIds.has(id))) layer.bindTooltip(name,{sticky:true,direction:"auto",opacity:.95}).openTooltip(); layer.setStyle({weight:s.showBorders?1.2:0,fillOpacity:s.selectedIds.has(id)?SEL_FILL_OPACITY:BASE_FILL_OPACITY}); }); layer.on("mouseout",()=>{ if(layer.isTooltipOpen()) layer.closeTooltip(); layer.unbindTooltip(); layer.setStyle(polyStyle(s.selectedIds.has(id))); }); layer.on("click",e=>{ toggleSelected(id); L.popup({closeButton:true,autoPan:false}).setLatLng(e.latlng).setContent(`<strong>Kommun:</strong> ${esc(s.idToName.get(id)||name)}`).openOn(s.map); requestAnimationFrame(()=>suppressLayerFocus(layer)); }); }}).addTo(s.map); s.map.fitBounds(s.municipalitiesLayer.getBounds(),{padding:[18,18],maxZoom:5.2}); load().forEach(id=>{ if(s.idToLayer.has(id)) s.selectedIds.add(id); }); refreshStyles(); buildList(); refreshSelectedLabels(); els.zoomNumber.value=s.map.getZoom().toFixed(1); s.map.on("zoom",()=>{els.zoomNumber.value=s.map.getZoom().toFixed(1); refreshSelectedLabels();}); s.map.on("moveend",refreshSelectedLabels); let unknown=0; s.idToName.forEach(n=>{if(n==="Okänd kommun") unknown++;}); if(unknown>10){ setStatus(`Kartan laddad, men många kommunnamn blev "Okänd kommun" (${unknown}).`); setDebug(`Hittade keys: [${keys.slice(0,18).join(", ")}${keys.length>18?", …":""}] | inferred nameKey=${s.inferredNameKey||"(none)"} | inferred idKey=${s.inferredIdKey||"(none)"}`); } else if(!canUseBaseTiles()&&wantsBaseTiles()){ setStatus("Bakgrundskarta kan inte visas när HTML-filen öppnas direkt från disk. Ren kommunvy används i stället."); setDebug(""); } else { setStatus(""); setDebug(""); } updateCounts(); } catch(e){ console.error(e); setStatus("Kunde inte ladda kartdata: "+(e?.message||e)); } }
      els.search.addEventListener("input",e=>filterList(e.target.value));
      els.borders.addEventListener("change",e=>{s.showBorders=e.target.checked; refreshStyles();});
      els.showSelectedLabels.addEventListener("change",e=>{s.showSelectedLabels=e.target.checked; refreshSelectedLabels();});
      document.querySelectorAll('input[name="basemapMode"]').forEach(el=>el.addEventListener("change",e=>{ s.basemapMode=e.target.value==="tiles"?"tiles":"plain"; saveBasemapMode(); applyBasemapMode(); if(s.basemapMode==="plain"){ setStatus(""); } else if(!canUseBaseTiles()){ setStatus("Bakgrundskarta kan inte visas när HTML-filen öppnas direkt från disk. Ren kommunvy används i stället."); } else { setStatus(""); } }));
      els.clearBtn.addEventListener("click",()=>{ [...s.selectedIds].forEach(id=>setSelected(id,false,true)); try{localStorage.removeItem(STORAGE_KEY)}catch(_){} setStatus("Rensade täckning."); });
      els.applyZoom.addEventListener("click",()=>{ const z=Number(els.zoomNumber.value); if(Number.isFinite(z)) s.map.setZoom(z,{animate:false}); });
      els.exportBtn.addEventListener("click",()=>requestAnimationFrame(exportPng));
      init();
    })();
  </script>
